global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'causalfunnel'

scrape_configs:
  - job_name: 'causalfunnel-api'
    static_configs:
      - targets: ['api:3001']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
